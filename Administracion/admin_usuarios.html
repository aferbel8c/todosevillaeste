<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin - Usuarios</title>
<link rel="icon" href="/icono/tse_black.png" type="image/png">
<link rel="stylesheet" href="/administracion/assets/ui_admin.css">
<script defer src="/administracion/assets/ui_admin.js"></script>
<style>
:root{
    --primary:#f3d044;
    --dark:#1f1f1f;
    --bg:#f4f6f9;
    --card:#ffffff;
    --border:#e1e1e1;
}
body{
    font-family:Segoe UI,Roboto,Arial,sans-serif;
    margin:0;
    background:var(--bg);
    color:#333;
}
.container{padding:20px;}
button{
    border:1px solid transparent;
    border-radius:5px;
    padding:8px 14px;
    cursor:pointer;
    font-weight:600;
    transition:transform .12s ease, opacity .12s ease, filter .12s ease, box-shadow .12s ease, border-color .12s ease;
}
button:not([disabled]):hover,
button:not([disabled]):focus-visible{
    transform:translateY(-2px) scale(1.02) !important;
    opacity:1 !important;
    filter:brightness(1.12) !important;
    border-color:#2a2a2a !important;
    box-shadow:0 0 0 3px rgba(243,208,68,.45), 0 8px 16px rgba(0,0,0,.22) !important;
    outline:none;
}
.primary{background:var(--primary);}
.dark{background:#222;color:#fff;}
.danger{background:#ff4d4d;color:#fff;}
.soft{background:#eee;}
.primary:not([disabled]):hover,.primary:not([disabled]):focus-visible{background:#ffdf58 !important;}
.dark:not([disabled]):hover,.dark:not([disabled]):focus-visible{background:#3a3a3a !important;}
.danger:not([disabled]):hover,.danger:not([disabled]):focus-visible{background:#ff6b6b !important;}
.soft:not([disabled]):hover,.soft:not([disabled]):focus-visible{background:#dfe4ea !important;}
.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    gap:12px;
    flex-wrap:wrap;
}
.filters{
    display:grid;
    grid-template-columns:repeat(5,minmax(160px,1fr));
    gap:10px;
    flex:1;
}
.filters-row{
    display:flex;
    align-items:flex-end;
    gap:10px;
    margin-bottom:12px;
}
.filters .field{display:flex;flex-direction:column;gap:4px}
.filters label{font-size:.82rem;color:#555;font-weight:600}
.filter-input-wrap{position:relative}
.filters input,
.filters select{
    width:100%;
    border:1px solid #c7c7c7;
    border-radius:10px;
    background:#fff;
    transition:border-color .15s ease;
    outline:none;
}
.filters input:focus,
.filters select:focus,
.filters input:focus-visible,
.filters select:focus-visible{
    border-color:#0f6cbd;
    outline:none;
}
.filter-input-wrap.float input,
.filter-input-wrap.float select{
    margin-bottom:0;
    padding:16px 12px 10px;
}
.filter-input-wrap.float.has-clear input,
.filter-input-wrap.float.has-clear select{
    padding-right:46px;
}
.filter-input-wrap.static{
    --static-border-color:#c7c7c7;
    display:flex;
    align-items:stretch;
    gap:0;
    position:relative;
    height:44px;
    border:1px solid var(--static-border-color);
    border-radius:10px;
    overflow:visible;
    background:#fff;
}
.filter-input-wrap.static::before,
.filter-input-wrap.static::after,
.filter-input-wrap.static .corner-fix{
    content:"";
    position:absolute;
    width:14px;
    height:14px;
    background:transparent;
    pointer-events:none;
    z-index:2;
}
.filter-input-wrap.static::before{
    left:-1px;
    top:-1px;
    border-top:1px solid var(--static-border-color);
    border-left:1px solid var(--static-border-color);
    border-top-left-radius:10px;
}
.filter-input-wrap.static::after{
    right:-1px;
    top:-1px;
    border-top:1px solid var(--static-border-color);
    border-right:1px solid var(--static-border-color);
    border-top-right-radius:10px;
}
.filter-input-wrap.static .corner-fix.bottom-left{
    left:-1px;
    bottom:-1px;
    border-bottom:1px solid var(--static-border-color);
    border-left:1px solid var(--static-border-color);
    border-bottom-left-radius:10px;
}
.filter-input-wrap.static .corner-fix.bottom-right{
    right:-1px;
    bottom:-1px;
    border-bottom:1px solid var(--static-border-color);
    border-right:1px solid var(--static-border-color);
    border-bottom-right-radius:10px;
}
.filter-input-wrap.static:focus-within{
    --static-border-color:#0f6cbd;
    border-color:#0f6cbd;
    box-shadow:0 0 0 1px #0f6cbd inset;
}
.filter-input-wrap.static label{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    display:inline-flex;
    align-items:center;
    min-width:0;
    margin:0;
    padding:0 8px;
    background:#fff;
    color:#6b7280;
    font-size:.95rem;
    font-weight:500;
    line-height:1;
    pointer-events:none;
    transition:all .15s ease;
    z-index:1;
    white-space:nowrap;
    max-width:calc(100% - 58px);
    overflow:hidden;
    text-overflow:ellipsis;
}
.filter-input-wrap.static select{
    width:100%;
    min-width:0;
    flex:1;
    margin:0;
    padding:10px 16px 8px;
    border:0;
    border-radius:0;
    background:#fff;
    appearance:auto;
    -webkit-appearance:auto;
    -moz-appearance:auto;
}
.filter-input-wrap.static input{
    width:100%;
    min-width:0;
    flex:1;
    margin:0;
    padding:10px 16px 8px;
    border:0;
    border-radius:0;
    background:#fff;
}
.filter-input-wrap.static:focus-within label,
.filter-input-wrap.static.has-value label{
    top:0;
    transform:translateY(-50%);
    font-size:.78rem;
    color:#111;
}
.filter-input-wrap.static .filter-clear-btn{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    border-radius:50%;
    border:0;
    width:26px;
    height:26px;
    margin:0;
    box-shadow:none;
    opacity:.7;
}
.filter-input-wrap.static .filter-clear-btn::after{
    display:none;
}
.filter-input-wrap.static .filter-clear-btn:hover,
.filter-input-wrap.static .filter-clear-btn:focus-visible{
    transform:translateY(-50%) !important;
    box-shadow:none !important;
    border-color:transparent !important;
    background:#f7f7f7 !important;
}
.filter-input-wrap.segmented{
    display:flex;
    align-items:stretch;
    gap:0;
    position:relative;
    height:44px;
    border:1px solid #c7c7c7;
    border-radius:10px;
    overflow:hidden;
    background:#fff;
}
.filter-input-wrap.segmented label{
    display:flex;
    align-items:center;
    padding:0 16px;
    min-width:84px;
    background:#fafafa;
    color:#555;
    font-size:.82rem;
    font-weight:600;
    line-height:1;
    pointer-events:auto;
    border-right:1px solid #c7c7c7;
    white-space:nowrap;
}
.filter-input-wrap.segmented select{
    width:100%;
    min-width:0;
    flex:1;
    margin:0;
    padding:10px 16px 8px;
    border:0;
    border-radius:0;
    background:#fff;
    appearance:auto;
    -webkit-appearance:auto;
    -moz-appearance:auto;
}
.filter-input-wrap.segmented .filter-clear-btn{
    position:static;
    top:auto;
    right:auto;
    transform:none;
    border-radius:0;
    border-left:1px solid #c7c7c7;
    width:36px;
    height:auto;
    margin:0;
    box-shadow:none;
    opacity:.7;
}
.filter-input-wrap.segmented .filter-clear-btn::after{
    display:none;
}
.filter-input-wrap.segmented .filter-clear-btn:hover,
.filter-input-wrap.segmented .filter-clear-btn:focus-visible{
    transform:none !important;
    box-shadow:none !important;
    border-color:#c7c7c7 !important;
    background:#f7f7f7 !important;
}
.filter-input-wrap.float label{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    background:transparent;
    color:#6b7280;
    font-size:.95rem;
    font-weight:500;
    transition:all .15s ease;
    pointer-events:none;
    line-height:1;
    padding:0;
}
.filter-input-wrap.float.has-clear label{
    display:inline-block;
    width:max-content;
    max-width:calc(100% - 58px);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}
.filter-input-wrap.float input::placeholder{
    opacity:0;
}
.filter-input-wrap.float input:focus + label,
.filter-input-wrap.float select:focus + label,
.filter-input-wrap.float.has-value label,
.filter-input-wrap.float input:not(:placeholder-shown) + label{
    top:-7px;
    transform:none;
    font-size:.78rem;
    color:#111;
    background:#fff;
    padding:0 6px;
}
.filter-clear-btn{
        position:absolute;
        right:10px;
        top:50%;
    transform:translateY(-50%);
    width:26px;
    height:26px;
    aspect-ratio:1/1;
    margin-top:0;
    border-radius:50%;
    border:0;
    background:transparent;
    color:#222;
    outline:none;
    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
    padding:0;
    line-height:1;
    display:none;
    cursor:pointer;
    opacity:.65;
    box-shadow:none;
    overflow:visible;
    transition:transform .12s ease, opacity .12s ease;
    align-items:center;
    justify-content:center;
}
button.filter-clear-btn:not([disabled]):hover,
button.filter-clear-btn:not([disabled]):focus-visible{
    opacity:1;
    transform:translateY(-50%) scale(1.08) !important;
    background:transparent !important;
    outline:none !important;
    box-shadow:none !important;
    filter:none !important;
    border-color:transparent !important;
}
.filter-clear-btn::after{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    width:26px;
    height:26px;
    border-radius:50%;
    transform:translate(-50%,-50%);
    box-shadow:none;
    pointer-events:none;
}
.filter-clear-btn:hover::after{box-shadow:0 6px 12px rgba(0,0,0,.12)}
.filter-clear-btn:focus,
.filter-clear-btn:focus-visible{outline:none;box-shadow:none}
.clear-all-filters-btn{
    display:none;
    align-self:flex-end;
    margin-bottom:2px;
    background:#c51f1a;
    color:#fff;
    border:2px solid #fff;
    border-radius:10px;
    box-shadow:0 6px 16px rgba(0,0,0,.25);
}
.clear-all-filters-btn:hover{
    background:#e35d59 !important;
    transform:none !important;
    opacity:1 !important;
}
@media(max-width:820px){
    .filters{grid-template-columns:1fr}
    .filters-row{flex-direction:column;align-items:stretch}
}
.default-badge{
    display:inline-block;
    margin-left:6px;
    padding:2px 7px;
    border-radius:999px;
    background:#fff5c2;
    border:1px solid #f0d56a;
    font-size:.72rem;
    font-weight:700;
    color:#5e4b00;
}
tr.default-account td{background:#fffdf2;}
table{
    width:100%;
    border-collapse:collapse;
    background:var(--card);
    border-radius:6px;
    overflow:visible;
}
th,td{border-bottom:1px solid var(--border);padding:10px;}
th{background:#fafafa;text-align:left;}
tbody tr:hover{background:#fff9db;}
tbody tr{
    transition: opacity .22s ease, transform .22s ease;
}
tr.user-actions-open td{
    background:#fff1b3 !important;
}
tr.user-actions-open{
    outline:2px solid #f3d044;
    outline-offset:-2px;
}
input,select{
    width:100%;
    padding:7px;
    padding-right:34px;
    border:1px solid #ccc;
    border-radius:4px;
}
input:focus,select:focus{border-color:var(--primary);outline:none;}
.pagination{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:10px;
}
.modal-bg{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.35);
    display:none;
    align-items:center;
    justify-content:center;
    padding:16px;
    z-index:30;
}

#editBg{
    z-index:40;
}

#modalBg{
    z-index:60;
}
.modal{
    background:#fff;
    padding:20px;
    border-radius:8px;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    animation:pop .15s ease;
}
.edit-menu{width:min(560px,95vw);}
.edit-grid{display:grid;grid-template-columns:1fr;gap:10px;}
.edit-help{font-size:.92rem;color:#666;}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-weight:700;margin-bottom:8px;}
.modal-actions{margin-top:15px;display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;}
.roles-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
}
.roles-checks{
    display:grid;
    grid-template-columns:repeat(3,minmax(120px,1fr));
    gap:8px;
}
.roles-check{
    display:flex;
    align-items:center;
    gap:6px;
    background:#f6f7fb;
    border:1px solid #dfe5ef;
    border-radius:8px;
    padding:8px 10px;
}
.roles-check input{
    width:auto;
    padding:0;
}
.role-badge{
    display:inline-block;
    margin-left:6px;
    padding:2px 7px;
    border-radius:999px;
    font-size:.72rem;
    font-weight:700;
    border:1px solid transparent;
}
.role-client{background:#eef3ff;border-color:#ccd8ff;color:#244a9a;}
.role-business{background:#ebfff4;border-color:#b7e7cb;color:#16623b;}
.role-admin{background:#fff1f1;border-color:#ffc4c4;color:#8f1f1f;}
.admin-chat-modal{width:min(760px,96vw);max-height:88vh;display:flex;flex-direction:column}
.admin-chat-head{display:flex;justify-content:space-between;align-items:center;gap:10px}
.admin-chat-body{
    margin-top:10px;
    border:1px solid #dbe3ee;
    border-radius:10px;
    background:#f6f9fd;
    padding:10px;
    height:360px;
    overflow:auto;
}
.admin-chat-msg{
    position:relative;
    max-width:74%;
    padding:8px 10px;
    border-radius:10px;
    margin-bottom:8px;
    box-shadow:0 1px 2px rgba(0,0,0,.08);
    white-space:pre-wrap;
    word-break:break-word;
}
.admin-chat-msg.mine{margin-left:auto;background:#dcf8c6}
.admin-chat-msg.other{margin-right:auto;background:#fff}
.admin-chat-msg.deleted{opacity:.8;font-style:italic}
.admin-chat-meta{font-size:.74rem;color:#64748b;margin-top:3px}
.admin-chat-menu{
    display:none;
    position:absolute;
    right:6px;
    top:6px;
    background:#fff;
    border:1px solid #d5deea;
    border-radius:8px;
    min-width:122px;
    box-shadow:0 8px 18px rgba(0,0,0,.12);
    z-index:8;
    padding:4px;
}
.admin-chat-menu.show{display:block}
.admin-chat-menu button{
    width:100%;
    text-align:left;
    border:none;
    border-radius:6px;
    background:#fff;
    color:#111;
    padding:6px 8px;
    font-size:.82rem;
}
.admin-chat-menu button:hover{background:#f3f6fb}
.admin-chat-compose{display:flex;gap:8px;align-items:flex-end;margin-top:10px}
.admin-chat-compose textarea{
    flex:1;
    min-height:52px;
    max-height:160px;
    resize:vertical;
    border:1px solid #cfd8e3;
    border-radius:8px;
    padding:9px;
}
.user-actions{
    position:relative;
    display:inline-flex;
    align-items:center;
}
.action-toggle{
    width:36px;
    height:34px;
    padding:0;
    background:#fff;
    border:1px solid #cfd5dd;
    display:inline-flex;
    align-items:center;
    justify-content:center;
}
.action-toggle .bars{
    display:flex;
    flex-direction:column;
    gap:4px;
}
.action-toggle .bar{
    width:16px;
    height:2px;
    background:#1f1f1f;
    border-radius:2px;
}
.user-actions-overlay{
    display:none;
    position:fixed;
    inset:0;
    z-index:999;
}
.user-actions-overlay.show{display:block;}
.user-actions-backdrop{
    position:absolute;
    inset:0;
    background:rgba(15,23,42,.18);
}
.user-actions-overlay-menu{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#fff;
    border:1px solid #d7dee8;
    border-radius:12px;
    padding:10px;
    width:min(420px,92vw);
    max-height:min(70vh,520px);
    overflow:auto;
    box-shadow:0 18px 40px rgba(17,24,39,.18);
}
.user-actions-overlay-menu .menu-action{
    width:100%;
    text-align:left;
    border:1px solid transparent;
    border-radius:8px;
    padding:9px 12px;
    font-size:.92rem;
    display:flex;
    align-items:center;
    gap:8px;
}
.user-actions-overlay-menu .menu-action + .menu-action{
    margin-top:6px;
}
.user-actions-overlay-menu .menu-action:hover{
    border-color:#1f1f1f;
}
</style>
</head>
<body>
<div class="container">
<div class="topbar">
    <div>
        <button class="primary" onclick="createDefaultUser()">Crear cuenta por defecto</button>
    </div>
    <div id="userCount"></div>
</div>

<div class="filters-row">
<div class="filters">
    <div class="field">
        <div class="filter-input-wrap static">
            <label for="searchUserId">ID</label>
            <input id="searchUserId" placeholder=" " autocomplete="off">
            <button type="button" class="filter-clear-btn" id="clearSearchUserId" onclick="clearUserFilter('searchUserId')">×</button>
            <span class="corner-fix bottom-left" aria-hidden="true"></span>
            <span class="corner-fix bottom-right" aria-hidden="true"></span>
        </div>
    </div>
    <div class="field">
        <div class="filter-input-wrap static">
            <label for="searchUsername">Usuario</label>
            <input id="searchUsername" placeholder=" " autocomplete="off">
            <button type="button" class="filter-clear-btn" id="clearSearchUsername" onclick="clearUserFilter('searchUsername')">×</button>
            <span class="corner-fix bottom-left" aria-hidden="true"></span>
            <span class="corner-fix bottom-right" aria-hidden="true"></span>
        </div>
    </div>
    <div class="field">
        <div class="filter-input-wrap static">
            <label for="searchEmail">Correo</label>
            <input id="searchEmail" placeholder=" " autocomplete="off">
            <button type="button" class="filter-clear-btn" id="clearSearchEmail" onclick="clearUserFilter('searchEmail')">×</button>
            <span class="corner-fix bottom-left" aria-hidden="true"></span>
            <span class="corner-fix bottom-right" aria-hidden="true"></span>
        </div>
    </div>
    <div class="field">
        <div class="filter-input-wrap segmented">
            <label for="searchDefaultState">Tipo</label>
            <select id="searchDefaultState">
                <option value="">Todas</option>
                <option value="default">Solo por defecto</option>
                <option value="custom">Solo no por defecto</option>
            </select>
            <button type="button" class="filter-clear-btn" id="clearSearchDefaultState" onclick="clearUserFilter('searchDefaultState')">×</button>
        </div>
    </div>
    <div class="field">
        <div class="filter-input-wrap segmented">
            <label for="searchRole">Rol</label>
            <select id="searchRole">
                <option value="">Todos</option>
                <option value="client">Usuario</option>
                <option value="business">Negocio</option>
                <option value="admin">Administrador</option>
            </select>
            <button type="button" class="filter-clear-btn" id="clearSearchRole" onclick="clearUserFilter('searchRole')">×</button>
        </div>
    </div>
</div>
<button type="button" id="clearAllUserFiltersBtn" class="clear-all-filters-btn" onclick="clearAllUserFilters()">Limpiar filtros</button>
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Usuario</th>
<th>Email</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="pagination">
    <button class="soft" onclick="prevPage()"><</button>
    <span id="pageInfo"></span>
    <button class="soft" onclick="nextPage()">></button>
</div>
</div>

<div class="modal-bg" id="modalBg">
    <div class="modal">
        <div class="modal-title" id="modalTitle"></div>
        <div id="modalText"></div>
        <div class="modal-actions">
            <button class="soft" onclick="closeModal()">Cancelar</button>
            <button class="primary" id="modalOk">Aceptar</button>
        </div>
    </div>
</div>

<div class="modal-bg" id="editBg">
    <div class="modal edit-menu">
        <div class="modal-title" id="editTitle"></div>
        <div class="edit-grid">
            <div>
                <label for="editUsername">Usuario</label>
                <input id="editUsername" autocomplete="off">
            </div>
            <div>
                <label for="editEmail">Correo</label>
                <input id="editEmail" autocomplete="off">
            </div>
            <div class="edit-help">Para eliminar cuenta, valida con la contraseña del administrador.</div>
            <div>
                <label for="adminDeletePassword">Contrasena admin</label>
                <input id="adminDeletePassword" type="password" autocomplete="current-password">
            </div>
        </div>
        <div class="modal-actions">
            <button class="dark" onclick="resetEditedUserPassword()">Resetear contraseña</button>
            <button class="primary" onclick="saveEditedUser()">Guardar cambios</button>
            <button class="soft" onclick="closeEditMenu()">Cancelar</button>
            <button class="danger" onclick="deleteEditedUser()">Eliminar cuenta</button>
        </div>
    </div>
</div>

<div class="modal-bg" id="rolesBg">
    <div class="modal edit-menu">
        <div class="modal-title" id="rolesTitle"></div>
        <div class="roles-grid">
            <div class="roles-checks">
                <label class="roles-check"><input id="roleClient" type="checkbox"> Usuario</label>
                <label class="roles-check"><input id="roleBusiness" type="checkbox"> Negocio</label>
                <label class="roles-check"><input id="roleAdmin" type="checkbox"> Administrador</label>
            </div>
            <div>
                <label for="roleBusinessPlace">Negocio asignado</label>
                <select id="roleBusinessPlace"></select>
            </div>
            <div class="edit-help">Si activas el rol negocio, debes seleccionar el negocio que gestionará.</div>
        </div>
        <div class="modal-actions">
            <button class="primary" onclick="saveUserRoles()">Guardar roles</button>
            <button class="soft" onclick="closeRolesMenu()">Cancelar</button>
        </div>
    </div>
</div>

<div class="modal-bg" id="chatBg">
    <div class="modal admin-chat-modal">
        <div class="admin-chat-head">
            <div>
                <div class="modal-title" id="chatTitle">Chat</div>
                <div class="edit-help">Remitente visible para el usuario: <strong>Administración</strong></div>
            </div>
            <button class="soft" onclick="closeAdminChat()">Cerrar</button>
        </div>
        <div id="adminChatBody" class="admin-chat-body"></div>
        <div class="admin-chat-compose">
            <textarea id="adminChatInput" placeholder="Escribe un mensaje para el usuario..."></textarea>
            <button class="primary" onclick="sendAdminChatMessage()">Enviar</button>
        </div>
    </div>
</div>

<div id="userActionsOverlay" class="user-actions-overlay" aria-hidden="true">
    <div class="user-actions-backdrop" onclick="closeUserActionMenus()"></div>
    <div id="userActionsOverlayMenu" class="user-actions-overlay-menu" onclick="event.stopPropagation()"></div>
</div>

<script>
const API_URL = location.origin;

let users = [];
let filteredUsers = [];
let page = 1;
const perPage = 15;
let usersPollTimer = null;
let editingUserId = null;
let editingSnapshot = null;
let filterTransitionTimer = null;
let rolesUserId = null;
let rolesUserLabel = "";
let rolesPlaces = [];
let adminChatUserId = null;
let adminChatRows = [];
let adminChatPollTimer = null;
let adminChatOpenMenuId = null;
let adminChatLastSignature = "";
let adminChatForceScrollBottom = false;
let openUserActionsId = null;
let roleOverrides = {};

const nativeFetch = window.fetch.bind(window);
window.fetch = async (input, init = {}) => {
    if(init.credentials === undefined) init.credentials = "include";
    const res = await nativeFetch(input, init);
    if(res.status === 401 && window.top && window.top !== window){
        window.top.postMessage({ type: "admin-auth-required" }, "*");
    }
    return res;
};

function showModal(title, text, ok){
    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalText").innerText = text;
    document.getElementById("modalBg").style.display = "flex";
    document.getElementById("modalOk").onclick = ()=>{
        closeModal();
        ok && ok();
    };
}

function closeModal(){
    document.getElementById("modalBg").style.display = "none";
}

function escapeHtml(value){
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
}

function closeEditMenu(){
    editingUserId = null;
    editingSnapshot = null;
    document.getElementById("adminDeletePassword").value = "";
    document.getElementById("editBg").style.display = "none";
    render();
}

function closeRolesMenu(){
    rolesUserId = null;
    rolesUserLabel = "";
    rolesPlaces = [];
    document.getElementById("rolesBg").style.display = "none";
}

function stopAdminChatPolling(){
    if(adminChatPollTimer){
        clearInterval(adminChatPollTimer);
        adminChatPollTimer = null;
    }
}

function closeAdminChat(){
    stopAdminChatPolling();
    adminChatUserId = null;
    adminChatRows = [];
    adminChatOpenMenuId = null;
    adminChatLastSignature = "";
    adminChatForceScrollBottom = false;
    document.getElementById("adminChatInput").value = "";
    document.getElementById("chatBg").style.display = "none";
}

function updateRolePlaceState(){
    const roleBusiness = document.getElementById("roleBusiness").checked;
    const placeSel = document.getElementById("roleBusinessPlace");
    placeSel.disabled = !roleBusiness;
}

function fillRolePlaceSelect(currentPlaceId){
    const userId = Number(rolesUserId);
    const sel = document.getElementById("roleBusinessPlace");
    const safeCurrent = Number.isFinite(Number(currentPlaceId)) ? Number(currentPlaceId) : 0;
    const options = ['<option value="">Selecciona un negocio...</option>'];
    rolesPlaces.forEach((p)=>{
        const pid = Number(p.public_id || 0);
        if(!Number.isFinite(pid) || pid <= 0) return;
        const ownerId = Number(p.owner_user_id || 0);
        const ownedByOther = ownerId > 0 && ownerId !== userId;
        const selected = pid === safeCurrent ? "selected" : "";
        const disabled = "";
        const ownerText = ownedByOther ? ` (propietario actual: u${ownerId})` : "";
        const name = escapeHtml(p.name || `Negocio ${pid}`);
        options.push(`<option value="${pid}" ${selected} ${disabled}>${pid} - ${name}${ownerText}</option>`);
    });
    sel.innerHTML = options.join("");
}

async function openRolesUser(id){
    const userId = Number(id);
    if(!Number.isFinite(userId) || userId <= 0) return;
    const user = users.find(u => Number(u.id) === userId);
    rolesUserId = userId;
    rolesUserLabel = user ? `${user.username || ""} (u${userId})` : `u${userId}`;
    document.getElementById("rolesTitle").innerText = `Roles de ${rolesUserLabel}`;
    try{
        const [rolesRes, placesRes] = await Promise.all([
            fetch(`${API_URL}/admin/users/${userId}/roles`),
            fetch(`${API_URL}/places`)
        ]);
        const rolesData = await rolesRes.json().catch(()=>({}));
        const placesData = await placesRes.json().catch(()=>([]));
        if(!rolesRes.ok){
            alert(rolesData.detail || "No se pudo cargar los roles.");
            return;
        }
        if(!placesRes.ok){
            alert("No se pudo cargar el listado de negocios.");
            return;
        }
        const roles = rolesData.roles || {};
        rolesPlaces = Array.isArray(placesData) ? placesData : [];
        document.getElementById("roleClient").checked = !!roles.client;
        document.getElementById("roleBusiness").checked = !!roles.business;
        document.getElementById("roleAdmin").checked = !!roles.admin;
        fillRolePlaceSelect(rolesData.business_place_public_id);
        updateRolePlaceState();
        document.getElementById("rolesBg").style.display = "flex";
    }catch(e){
        alert("No se pudo abrir el gestor de roles.");
    }
}

async function saveUserRoles(){
    if(rolesUserId === null) return;
    const role_client = !!document.getElementById("roleClient").checked;
    const role_business = !!document.getElementById("roleBusiness").checked;
    const role_admin = !!document.getElementById("roleAdmin").checked;
    const placeRaw = (document.getElementById("roleBusinessPlace").value || "").trim();
    const placeId = placeRaw ? Number(placeRaw) : null;

    if(role_business && (!Number.isFinite(placeId) || placeId <= 0)){
        alert("Debes seleccionar un negocio para el rol negocio.");
        return;
    }
    if(!role_client && !role_business && !role_admin){
        alert("Debes mantener al menos un rol activo.");
        return;
    }

    const payload = {
        role_client,
        role_business,
        role_admin,
        business_place_public_id: role_business ? placeId : null
    };

    const res = await fetch(`${API_URL}/admin/users/${rolesUserId}/roles`, {
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload)
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok){
        alert(data.detail || "No se pudieron guardar los roles.");
        return;
    }
    const targetId = rolesUserId;
    roleOverrides[String(targetId)] = { client: role_client, business: role_business, admin: role_admin };
    closeRolesMenu();
    render();
    setTimeout(() => {
        fetchUsers();
    }, 1200);
}

function openEditUser(id){
    const user = users.find(u => Number(u.id) === Number(id));
    if(!user) return;

    editingUserId = Number(id);
    editingSnapshot = {
        id: Number(user.id),
        username: user.username || "",
        email: user.email || ""
    };

    document.getElementById("editTitle").innerText = `Editando el perfil ${editingSnapshot.username} con id ${editingSnapshot.id}.`;
    document.getElementById("editUsername").value = editingSnapshot.username;
    document.getElementById("editEmail").value = editingSnapshot.email;
    document.getElementById("adminDeletePassword").value = "";
    document.getElementById("editBg").style.display = "flex";
}

async function fetchUsers(){
    const r = await fetch(`${API_URL}/users`);
    if(!r.ok) return;
    users = await r.json();

    if(editingUserId !== null) return;

    users.forEach((u) => {
        const key = String(u.id);
        if(roleOverrides[key] && rolesEqual(roleOverrides[key], u.roles || {})){
            delete roleOverrides[key];
        }
    });

    render();
}

function render(){
    closeUserActionMenus();
    const idQ = (document.getElementById("searchUserId")?.value || "").trim().toLowerCase();
    const usernameQ = (document.getElementById("searchUsername")?.value || "").trim().toLowerCase();
    const emailQ = (document.getElementById("searchEmail")?.value || "").trim().toLowerCase();
    const defaultQ = (document.getElementById("searchDefaultState")?.value || "").trim().toLowerCase();
    const roleQ = (document.getElementById("searchRole")?.value || "").trim().toLowerCase();

    filteredUsers = users.filter(u => {
        const visibleId = String(u.visible_id || `u${u.id}`).toLowerCase();
        const rawId = String(u.id || "").toLowerCase();
        const username = String(u.username || "").toLowerCase();
        const email = String(u.email || "").toLowerCase();
        const isDefault = !!u.is_default_account;
        const roles = u.roles || {};
        const idMatch = !idQ || visibleId.includes(idQ) || rawId.includes(idQ);
        const userMatch = !usernameQ || username.includes(usernameQ);
        const emailMatch = !emailQ || email.includes(emailQ);
        const defaultMatch = !defaultQ ||
          (defaultQ === "default" && isDefault) ||
          (defaultQ === "custom" && !isDefault);
        const roleMatch = !roleQ || (
            (roleQ === "client" && !!roles.client) ||
            (roleQ === "business" && !!roles.business) ||
            (roleQ === "admin" && !!roles.admin)
        );
        return idMatch && userMatch && emailMatch && defaultMatch && roleMatch;
    });

    const totalPages = Math.max(1, Math.ceil(filteredUsers.length/perPage));
    if(page > totalPages) page = totalPages;

    const start = (page - 1) * perPage;
    const slice = filteredUsers.slice(start, start + perPage);
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    slice.forEach(u=>{
        const tr = document.createElement("tr");
        if(u.is_default_account) tr.classList.add("default-account");
        const override = roleOverrides[String(u.id)];
        const roles = override || (u.roles || {});
        const roleBadges = [
            roles.client ? '<span class="role-badge role-client">Usuario</span>' : '',
            roles.business ? '<span class="role-badge role-business">Negocio</span>' : '',
            roles.admin ? '<span class="role-badge role-admin">Admin</span>' : ''
        ].join("");
        tr.innerHTML = `
        <td>${escapeHtml(u.visible_id || `u${u.id}`)}</td>
        <td>${escapeHtml(u.username)}${u.is_default_account ? ' <span class="default-badge">Por defecto</span>' : ''}${roleBadges}</td>
        <td>${escapeHtml(u.email)}</td>
        <td>
            <div class="user-actions">
                <button class="action-toggle" onclick="toggleUserActions(${u.id}, event)" aria-label="Abrir opciones de usuario">
                    <span class="bars">
                        <span class="bar"></span>
                        <span class="bar"></span>
                        <span class="bar"></span>
                    </span>
                </button>
                <div class="user-actions-menu" id="userActions_${u.id}" style="display:none" onclick="event.stopPropagation()">
                    <button class="menu-action primary" onclick="handleUserAction('edit', ${u.id})">Editar</button>
                    <button class="menu-action soft" onclick="handleUserAction('roles', ${u.id})">Roles</button>
                    <button class="menu-action soft" onclick="handleUserAction('reviews', ${u.id})">Ver reseñas enviadas</button>
                </div>
            </div>
        </td>`;
        tbody.appendChild(tr);
    });

    document.getElementById("pageInfo").innerText = `Pagina ${page} / ${totalPages}`;
    document.getElementById("userCount").innerText = `${filteredUsers.length} usuarios mostrados de ${users.length}`;
    updateUserFilterButtons();
}

function rolesEqual(a, b){
    const ra = a || {};
    const rb = b || {};
    return !!ra.client === !!rb.client &&
        !!ra.business === !!rb.business &&
        !!ra.admin === !!rb.admin;
}

function updateUserFilterButtons(){
    const fields = ["searchUserId", "searchUsername", "searchEmail", "searchDefaultState", "searchRole"];
    let hasAny = false;
    fields.forEach((id)=>{
        const el = document.getElementById(id);
        const wrap = el?.closest(".filter-input-wrap");
        const clearBtn = document.getElementById(`clear${id.charAt(0).toUpperCase()}${id.slice(1)}`);
        const hasValue = !!String(el?.value || "").trim();
        if(hasValue) hasAny = true;
        if(clearBtn) clearBtn.style.display = hasValue ? "inline-flex" : "none";
        if(wrap) wrap.classList.toggle("has-value", hasValue);
    });
    const allBtn = document.getElementById("clearAllUserFiltersBtn");
    if(allBtn) allBtn.style.display = hasAny ? "inline-flex" : "none";
}

function clearUserFilter(fieldId){
    const el = document.getElementById(fieldId);
    if(!el) return;
    if(el.tagName === "SELECT"){
        el.value = "";
    }else{
        el.value = "";
    }
    updateUserFilterButtons();
    page = 1;
    renderWithFilterTransition();
}

function clearAllUserFilters(){
    ["searchUserId", "searchUsername", "searchEmail", "searchDefaultState", "searchRole"].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.value = "";
    });
    updateUserFilterButtons();
    page = 1;
    renderWithFilterTransition();
}

function animateRowsIn(){
    const rows = Array.from(document.querySelectorAll("#tbody tr"));
    rows.forEach((tr, idx) => {
        tr.style.opacity = "0";
        tr.style.transform = "translateY(8px)";
        setTimeout(() => {
            tr.style.opacity = "1";
            tr.style.transform = "translateY(0)";
        }, 24 + (idx * 18));
    });
}

function renderWithFilterTransition(){
    const tbody = document.getElementById("tbody");
    const rows = Array.from(tbody.querySelectorAll("tr"));
    clearTimeout(filterTransitionTimer);

    if(!rows.length){
        render();
        animateRowsIn();
        return;
    }

    rows.forEach((tr, idx) => {
        tr.style.opacity = "0";
        tr.style.transform = "translateY(6px)";
        tr.style.transitionDelay = `${Math.min(idx, 10) * 10}ms`;
    });

    filterTransitionTimer = setTimeout(() => {
        render();
        animateRowsIn();
    }, 170);
}

function nextPage(){
    const totalPages = Math.max(1, Math.ceil(filteredUsers.length/perPage));
    if(page < totalPages){
        page++;
        render();
    }
}

function prevPage(){
    if(page > 1){
        page--;
        render();
    }
}

function debounceRender(){
    page = 1;
    renderWithFilterTransition();
}

function openUserReviews(userId){
    window.top?.postMessage({
        type: "open-admin-reviews",
        filters: { user_id: userId }
    }, "*");
}

function closeUserActionMenus(){
    openUserActionsId = null;
    const overlay = document.getElementById("userActionsOverlay");
    const overlayMenu = document.getElementById("userActionsOverlayMenu");
    if(overlay){
        overlay.classList.remove("show");
        overlay.setAttribute("aria-hidden", "true");
    }
    if(overlayMenu){
        overlayMenu.innerHTML = "";
    }
    document.querySelectorAll("tr.user-actions-open").forEach((el)=>el.classList.remove("user-actions-open"));
}

function toggleUserActions(userId, e){
    if(e){ e.stopPropagation(); }
    const id = Number(userId || 0);
    const overlay = document.getElementById("userActionsOverlay");
    const overlayMenu = document.getElementById("userActionsOverlayMenu");
    const row = e?.currentTarget?.closest("tr") || null;
    const willOpen = openUserActionsId !== id || !overlay?.classList.contains("show");
    closeUserActionMenus();
    if(willOpen){
        openUserActionsId = id;
        if(row) row.classList.add("user-actions-open");
        if(!overlay || !overlayMenu) return;
        overlayMenu.innerHTML = `
            <button class="menu-action primary" onclick="handleUserAction('edit', ${id})">Editar</button>
            <button class="menu-action soft" onclick="handleUserAction('roles', ${id})">Roles</button>
            <button class="menu-action soft" onclick="handleUserAction('reviews', ${id})">Ver reseñas enviadas</button>
        `;
        overlay.classList.add("show");
        overlay.setAttribute("aria-hidden", "false");
        requestAnimationFrame(() => overlayMenu.querySelector("button")?.focus());
    }
}

function handleUserAction(type, userId){
    closeUserActionMenus();
    if(type === "edit") return openEditUser(userId);
    if(type === "roles") return openRolesUser(userId);
    if(type === "reviews") return openUserReviews(userId);
}

function renderAdminChat(opts = {}){
    const body = document.getElementById("adminChatBody");
    const prevTop = Number(opts.prevTop || 0);
    const stickBottom = !!opts.stickBottom;
    if(!Array.isArray(adminChatRows) || !adminChatRows.length){
        body.innerHTML = '<div class="edit-help">Todavía no hay mensajes en este chat.</div>';
        return;
    }
    body.innerHTML = adminChatRows.map((m)=>{
        const msgId = Number(m.id || 0);
        const canManage = !!(m.is_admin_sender && !m.is_deleted);
        return `
        <div class="admin-chat-msg ${m.is_admin_sender ? "mine" : "other"} ${m.is_deleted ? "deleted" : ""}" ${canManage ? `oncontextmenu="toggleAdminChatMessageMenu(${msgId}, event)"` : ""}>
            ${canManage ? `
                <div id="adminChatMenu_${msgId}" class="admin-chat-menu" onclick="event.stopPropagation()" oncontextmenu="event.preventDefault(); event.stopPropagation();">
                    <button type="button" onclick="editAdminChatMessage(${msgId})">Editar</button>
                    <button type="button" onclick="deleteAdminChatMessage(${msgId})">Eliminar</button>
                </div>
            ` : ""}
            <div>${escapeHtml(m.body || "")}</div>
            <div class="admin-chat-meta">${escapeHtml(m.sender_label || "")} | ${escapeHtml(String(m.created_at || "").replace("T"," ").slice(0,16))}${m.edited && !m.is_deleted ? " (editado)" : ""}</div>
        </div>
    `;
    }).join("");
    if(stickBottom){
        body.scrollTop = body.scrollHeight;
    }else{
        body.scrollTop = prevTop;
    }
}

function closeAdminChatMenus(){
    adminChatOpenMenuId = null;
    document.querySelectorAll(".admin-chat-menu.show").forEach((el)=>el.classList.remove("show"));
}

function toggleAdminChatMessageMenu(messageId, e){
    if(e){ e.preventDefault(); e.stopPropagation(); }
    const menuId = `adminChatMenu_${Number(messageId)}`;
    const menu = document.getElementById(menuId);
    if(!menu) return;
    const same = adminChatOpenMenuId === menuId;
    closeAdminChatMenus();
    if(!same){
        adminChatOpenMenuId = menuId;
        menu.classList.add("show");
    }
}

function adminChatRowsSignature(rows){
    const safe = Array.isArray(rows) ? rows : [];
    return safe.map((m) => [
        Number(m.id || 0),
        String(m.created_at || ""),
        String(m.body || ""),
        m.is_deleted ? 1 : 0,
        m.edited ? 1 : 0
    ].join("|")).join("||");
}

async function loadAdminChat(){
    if(!adminChatUserId) return;
    const bodyEl = document.getElementById("adminChatBody");
    const prevTop = bodyEl ? bodyEl.scrollTop : 0;
    const prevDistanceToBottom = bodyEl ? (bodyEl.scrollHeight - bodyEl.clientHeight - bodyEl.scrollTop) : 0;
    const wasNearBottom = prevDistanceToBottom <= 64;
    const res = await fetch(`${API_URL}/admin/users/${adminChatUserId}/chat`);
    const data = await res.json().catch(()=>({}));
    if(!res.ok){
        alert(data.detail || "No se pudo cargar el chat.");
        closeAdminChat();
        return;
    }
    const user = data.user || {};
    document.getElementById("chatTitle").innerText = `Chat con ${user.username || `u${adminChatUserId}`}`;
    const nextRows = Array.isArray(data.messages) ? data.messages : [];
    const nextSignature = adminChatRowsSignature(nextRows);
    if(nextSignature === adminChatLastSignature){
        return;
    }
    adminChatRows = nextRows;
    adminChatLastSignature = nextSignature;
    renderAdminChat({
        prevTop,
        stickBottom: adminChatForceScrollBottom || wasNearBottom
    });
    adminChatForceScrollBottom = false;
}

async function openAdminChat(userId){
    const uid = Number(userId || 0);
    if(!Number.isFinite(uid) || uid <= 0){
        alert("Usuario inválido.");
        return;
    }
    adminChatUserId = uid;
    adminChatLastSignature = "";
    adminChatForceScrollBottom = true;
    document.getElementById("chatBg").style.display = "flex";
    await loadAdminChat();
    stopAdminChatPolling();
    adminChatPollTimer = setInterval(loadAdminChat, 4000);
}

async function sendAdminChatMessage(){
    const uid = Number(adminChatUserId || 0);
    if(!uid){
        alert("No hay chat seleccionado.");
        return;
    }
    const txtEl = document.getElementById("adminChatInput");
    const message = String(txtEl.value || "").trim();
    if(!message){
        alert("Debes escribir un mensaje.");
        return;
    }
    const res = await fetch(`${API_URL}/admin/users/${uid}/chat/messages`, {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({ message })
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok){
        alert(data.detail || "No se pudo enviar el mensaje.");
        return;
    }
    txtEl.value = "";
    adminChatForceScrollBottom = true;
    await loadAdminChat();
}

async function editAdminChatMessage(messageId){
    closeAdminChatMenus();
    const msg = adminChatRows.find((m) => Number(m.id) === Number(messageId));
    if(!msg || msg.is_deleted) return;
    const nextText = prompt("Editar mensaje:", msg.body || "");
    if(nextText === null) return;
    const cleaned = String(nextText || "").trim();
    if(!cleaned){
        alert("El mensaje no puede estar vacío.");
        return;
    }
    const res = await fetch(`${API_URL}/admin/users/${adminChatUserId}/chat/messages/${Number(messageId)}`, {
        method: "PATCH",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({ message: cleaned })
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok){
        alert(data.detail || "No se pudo editar el mensaje.");
        return;
    }
    adminChatForceScrollBottom = false;
    await loadAdminChat();
}

async function deleteAdminChatMessage(messageId){
    closeAdminChatMenus();
    if(!confirm("¿Eliminar este mensaje?")) return;
    const res = await fetch(`${API_URL}/admin/users/${adminChatUserId}/chat/messages/${Number(messageId)}`, {
        method: "DELETE"
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok){
        alert(data.detail || "No se pudo eliminar el mensaje.");
        return;
    }
    adminChatForceScrollBottom = false;
    await loadAdminChat();
}

async function saveEditedUser(){
    if(editingUserId === null) return;

    const username = document.getElementById("editUsername").value.trim();
    const email = document.getElementById("editEmail").value.trim().toLowerCase();

    if(!username || !email){
        alert("Usuario y correo son obligatorios.");
        return;
    }

    const resp = await fetch(`${API_URL}/users/${editingUserId}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ username, email })
    });
    const data = await resp.json().catch(()=>({}));
    if(!resp.ok){
        alert(data.detail || "No se pudo guardar el usuario.");
        return;
    }

    closeEditMenu();
    fetchUsers();
}

async function resetEditedUserPassword(){
    if(editingUserId === null) return;
    const targetUserId = Number(editingUserId);
    if(!Number.isFinite(targetUserId) || targetUserId <= 0){
        alert("Usuario inválido para resetear contraseña.");
        return;
    }

    showModal("Reset contraseña", "Se enviara nueva contraseña por correo.", async ()=>{
        const resp = await fetch(`${API_URL}/users/${targetUserId}/reset_password`, { method:"POST" });
        const data = await resp.json().catch(()=>({}));
        if(!resp.ok){
            alert(data.detail || "No se pudo resetear la contraseña.");
            return;
        }
        alert(data.detail || "Contrasena reseteada.");
    });
}

async function verifyAdminPasswordForDelete(password){
    const payload = { password: password || "" };
    if(!payload.password) return false;
    const res = await fetch("/admin/auth/verify_password", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(payload),
        credentials:"include"
    });
    if(res.status === 404){
        alert("Tu servidor no tiene /admin/auth/verify_password (backend sin actualizar o sin reiniciar). Reinicia el backend de administración y vuelve a intentarlo.");
        return false;
    }
    return res.ok;
}

async function deleteEditedUser(){
    if(editingUserId === null) return;
    const targetUserId = Number(editingUserId);
    if(!Number.isFinite(targetUserId) || targetUserId <= 0){
        alert("Usuario inválido para eliminar.");
        return;
    }

    const adminPassword = document.getElementById("adminDeletePassword").value;
    if(!adminPassword){
        alert("Debes indicar la contraseña de administrador para eliminar.");
        return;
    }

    showModal("Eliminar usuario", "Seguro que deseas borrar este usuario?", async ()=>{
        const valid = await verifyAdminPasswordForDelete(adminPassword);
        if(!valid){
            alert("Contrasena de administrador incorrecta.");
            return;
        }

        const resp = await fetch(`${API_URL}/users/${targetUserId}`, { method:"DELETE" });
        const data = await resp.json().catch(()=>({}));
        if(!resp.ok){
            alert(data.detail || "No se pudo eliminar el usuario.");
            return;
        }

        closeEditMenu();
        fetchUsers();
    });
}

function rand(n){
    return Math.random().toString(36).substring(2,2+n);
}

function createDefaultUser(){
    const username = "user_" + rand(5);
    const password = rand(10);
    const email = username + "@correo.es";

    showModal(
        "Crear usuario de prueba",
        `Se creara:\n\nUsuario: ${username}\nPassword: ${password}\nEmail: ${email}`,
        async ()=>{
            const resp = await fetch(`${API_URL}/users`,{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({username,email,password,is_default_account:true})
            });
            const data = await resp.json().catch(()=>({}));
            if(!resp.ok){
                alert(data.detail || "No se pudo crear el usuario.");
                return;
            }
            fetchUsers();
        }
    );
}

fetchUsers();

["searchUserId", "searchUsername", "searchEmail", "searchDefaultState", "searchRole"].forEach(id => {

    const evt = el.tagName === "SELECT" ? "change" : "input";

document.getElementById("adminChatInput")?.addEventListener("keydown", (e) => {

updateUserFilterButtons();
